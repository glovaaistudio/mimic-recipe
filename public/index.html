<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mimic Recipe — Turn any label into a recipe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #F7F9F6; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const ACCENT = "#4CAF82";
const ACCENT2 = "#F9A825";
const BG = "#F7F9F6";
const CARD = "#FFFFFF";
const TEXT = "#1A2E1A";
const MUTED = "#6B7C6B";

const styles = {
  app: { minHeight: "100vh", background: BG, color: TEXT },
  header: { background: CARD, borderBottom: "1px solid #E0EBE0", padding: "18px 24px", display: "flex", alignItems: "center", gap: "12px" },
  logo: { fontSize: "22px", fontWeight: "800", color: ACCENT, letterSpacing: "-0.5px" },
  logoSub: { fontSize: "12px", color: MUTED, fontWeight: "500", letterSpacing: "0.5px", textTransform: "uppercase" },
  hero: { textAlign: "center", padding: "48px 24px 32px", maxWidth: "600px", margin: "0 auto" },
  heroTitle: { fontSize: "32px", fontWeight: "800", lineHeight: "1.2", marginBottom: "12px", color: TEXT },
  heroSub: { fontSize: "16px", color: MUTED, lineHeight: "1.6", marginBottom: "32px" },
  card: { background: CARD, borderRadius: "16px", padding: "28px", boxShadow: "0 2px 16px rgba(0,0,0,0.06)", maxWidth: "600px", margin: "0 auto 24px" },
  tabRow: { display: "flex", gap: "8px", marginBottom: "24px", background: BG, padding: "4px", borderRadius: "10px" },
  tab: (active) => ({ flex: 1, padding: "10px", border: "none", borderRadius: "8px", fontWeight: "600", fontSize: "14px", cursor: "pointer", background: active ? ACCENT : "transparent", color: active ? "#fff" : MUTED }),
  textarea: { width: "100%", minHeight: "120px", border: "1.5px solid #D6E8D6", borderRadius: "10px", padding: "14px", fontSize: "15px", fontFamily: "inherit", color: TEXT, background: BG, resize: "vertical", outline: "none", boxSizing: "border-box", lineHeight: "1.6" },
  uploadArea: (dragging) => ({ border: `2px dashed ${dragging ? ACCENT : "#C0D8C0"}`, borderRadius: "12px", padding: "40px 24px", textAlign: "center", cursor: "pointer", background: dragging ? "#EEF7EE" : BG }),
  uploadIcon: { fontSize: "40px", marginBottom: "12px" },
  uploadText: { fontSize: "15px", color: MUTED, marginBottom: "8px" },
  previewImg: { width: "100%", maxHeight: "220px", objectFit: "cover", borderRadius: "10px", marginBottom: "16px" },
  label: { fontSize: "13px", fontWeight: "600", color: MUTED, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px", display: "block" },
  btn: (disabled) => ({ width: "100%", padding: "14px", background: disabled ? "#C8DFC8" : ACCENT, color: "#fff", border: "none", borderRadius: "10px", fontSize: "16px", fontWeight: "700", cursor: disabled ? "not-allowed" : "pointer", marginTop: "20px" }),
  servingsRow: { display: "flex", alignItems: "center", gap: "12px", marginBottom: "20px" },
  servingsBtn: { width: "36px", height: "36px", borderRadius: "50%", border: `2px solid ${ACCENT}`, background: "white", color: ACCENT, fontSize: "20px", fontWeight: "700", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 },
  servingsNum: { fontSize: "18px", fontWeight: "700", color: TEXT, minWidth: "28px", textAlign: "center" },
  resultCard: { background: CARD, borderRadius: "16px", padding: "28px", boxShadow: "0 2px 16px rgba(0,0,0,0.06)", maxWidth: "600px", margin: "0 auto 32px" },
  recipeTitle: { fontSize: "24px", fontWeight: "800", color: TEXT, marginBottom: "6px" },
  recipeTagline: { fontSize: "14px", color: MUTED, marginBottom: "24px" },
  sectionHead: { fontSize: "13px", fontWeight: "700", textTransform: "uppercase", letterSpacing: "0.8px", color: ACCENT, marginBottom: "12px", marginTop: "24px", paddingBottom: "6px", borderBottom: "2px solid #E8F5E8" },
  ingredientItem: { display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #F0F0F0", fontSize: "15px" },
  stepItem: { display: "flex", gap: "14px", marginBottom: "16px", alignItems: "flex-start" },
  stepNum: { minWidth: "28px", height: "28px", borderRadius: "50%", background: ACCENT, color: "white", fontWeight: "700", fontSize: "13px", display: "flex", alignItems: "center", justifyContent: "center", marginTop: "1px" },
  stepText: { fontSize: "15px", lineHeight: "1.7", color: TEXT },
  tipBox: { background: "#FFF8E8", border: `1px solid ${ACCENT2}30`, borderRadius: "10px", padding: "14px 16px", fontSize: "14px", color: "#7A5C00", lineHeight: "1.6", marginTop: "20px" },
  badge: { display: "inline-block", background: "#EEF7EE", color: ACCENT, borderRadius: "20px", padding: "4px 12px", fontSize: "12px", fontWeight: "600", marginRight: "6px", marginBottom: "6px" },
  errorBox: { background: "#FFF0F0", border: "1px solid #FFCCCC", borderRadius: "10px", padding: "14px", color: "#CC0000", fontSize: "14px", marginTop: "16px" },
  spinner: { display: "flex", flexDirection: "column", alignItems: "center", padding: "40px", gap: "16px", color: MUTED, fontSize: "15px" },
  poweredBy: { textAlign: "center", padding: "12px", fontSize: "12px", color: "#AABCAA", marginTop: "8px" }
};

function Spinner() {
  return (
    <div style={styles.spinner}>
      <div style={{ width: "40px", height: "40px", border: "3px solid #E0EBE0", borderTop: "3px solid " + ACCENT, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      <span>Crafting your recipe...</span>
    </div>
  );
}

function RecipeResult({ data, servings, setServings }) {
  const scale = servings / (data.baseServings || 2);
  const scaleAmount = (amount) => {
    const num = parseFloat(amount);
    if (isNaN(num)) return amount;
    const scaled = num * scale;
    return scaled % 1 === 0 ? scaled : scaled.toFixed(1);
  };

  return (
    <div style={styles.resultCard}>
      <div style={styles.recipeTitle}>{data.title}</div>
      <div style={styles.recipeTagline}>{data.tagline}</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", marginBottom: "8px" }}>
        {(data.tags || []).map((t, i) => <span key={i} style={styles.badge}>{t}</span>)}
      </div>
      <div style={styles.sectionHead}>Servings</div>
      <div style={styles.servingsRow}>
        <button style={styles.servingsBtn} onClick={() => setServings(Math.max(1, servings - 1))}>−</button>
        <span style={styles.servingsNum}>{servings}</span>
        <button style={styles.servingsBtn} onClick={() => setServings(servings + 1)}>+</button>
        <span style={{ fontSize: "14px", color: MUTED }}>people</span>
      </div>
      <div style={styles.sectionHead}>Ingredients</div>
      {(data.ingredients || []).map((ing, i) => (
        <div key={i} style={styles.ingredientItem}>
          <span>{ing.name}</span>
          <span style={{ color: ACCENT, fontWeight: "600" }}>{scaleAmount(ing.amount)} {ing.unit}</span>
        </div>
      ))}
      <div style={styles.sectionHead}>Method</div>
      {(data.steps || []).map((step, i) => (
        <div key={i} style={styles.stepItem}>
          <div style={styles.stepNum}>{i + 1}</div>
          <div style={styles.stepText}>{step}</div>
        </div>
      ))}
      {data.tip && <div style={styles.tipBox}>💡 <strong>Pro tip:</strong> {data.tip}</div>}
      {data.variations && (
        <>
          <div style={styles.sectionHead}>Variations to try</div>
          <div style={{ fontSize: "15px", color: TEXT, lineHeight: "1.7" }}>{data.variations}</div>
        </>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("text");
  const [ingredientText, setIngredientText] = useState("");
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [loading, setLoading] = useState(false);
  const [recipe, setRecipe] = useState(null);
  const [error, setError] = useState(null);
  const [servings, setServings] = useState(2);
  const fileRef = useRef();

  const handleImage = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setImageFile(file);
    const reader = new FileReader();
    reader.onload = (e) => {
      setImagePreview(e.target.result);
      setImageBase64(e.target.result.split(",")[1]);
    };
    reader.readAsDataURL(file);
  };

  const generate = async () => {
    setLoading(true);
    setError(null);
    setRecipe(null);
    setServings(2);
    try {
      const body = tab === "text"
        ? { ingredientText }
        : { imageBase64, imageMediaType: imageFile.type };

      const response = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!response.ok) throw new Error("Request failed");

      const data = await response.json();
      setRecipe(data);
    } catch (e) {
      setError("Something went wrong generating your recipe. Please check your ingredients and try again.");
    }
    setLoading(false);
  };

  const canGenerate = tab === "text" ? ingredientText.trim().length > 10 : !!imageBase64;

  return (
    <div style={styles.app}>
      <div style={styles.header}>
        <div>
          <div style={styles.logo}>🍃 Mimic Recipe</div>
          <div style={styles.logoSub}>Turn any label into a recipe</div>
        </div>
      </div>

      <div style={styles.hero}>
        <div style={styles.heroTitle}>Love a product?<br />Make it yourself.</div>
        <div style={styles.heroSub}>Enter the ingredients from any food or drink you love, or snap a photo of the label — and get a home recipe instantly.</div>
      </div>

      <div style={{ padding: "0 16px" }}>
        <div style={styles.card}>
          <div style={styles.tabRow}>
            <button style={styles.tab(tab === "text")} onClick={() => { setTab("text"); setRecipe(null); setError(null); }}>✏️ Type ingredients</button>
            <button style={styles.tab(tab === "photo")} onClick={() => { setTab("photo"); setRecipe(null); setError(null); }}>📷 Upload a photo</button>
          </div>

          {tab === "text" && (
            <>
              <label style={styles.label}>Paste the ingredients list</label>
              <textarea
                style={styles.textarea}
                placeholder="e.g. Water, Mango (32%), Pineapple juice, Banana purée, Passion fruit (4%), Lemon juice, Natural flavourings..."
                value={ingredientText}
                onChange={e => setIngredientText(e.target.value)}
              />
            </>
          )}

          {tab === "photo" && (
            <>
              <label style={styles.label}>Photo of your product label</label>
              {imagePreview ? (
                <>
                  <img src={imagePreview} alt="Label preview" style={styles.previewImg} />
                  <button style={{ ...styles.btn(false), background: "#f0f0f0", color: MUTED, marginTop: "0" }} onClick={() => { setImageFile(null); setImagePreview(null); setImageBase64(null); }}>Remove photo</button>
                </>
              ) : (
                <div
                  style={styles.uploadArea(dragging)}
                  onClick={() => fileRef.current.click()}
                  onDragOver={e => { e.preventDefault(); setDragging(true); }}
                  onDragLeave={() => setDragging(false)}
                  onDrop={e => { e.preventDefault(); setDragging(false); handleImage(e.dataTransfer.files[0]); }}
                >
                  <div style={styles.uploadIcon}>📸</div>
                  <div style={styles.uploadText}>Tap to upload or drag a photo here</div>
                  <div style={{ fontSize: "13px", color: "#AABCAA" }}>JPG, PNG, WEBP supported</div>
                  <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleImage(e.target.files[0])} />
                </div>
              )}
            </>
          )}

          <button style={styles.btn(!canGenerate)} disabled={!canGenerate} onClick={generate}>Generate My Recipe →</button>
          {error && <div style={styles.errorBox}>⚠️ {error}</div>}
        </div>

        {loading && <div style={styles.resultCard}><Spinner /></div>}
        {recipe && !loading && <RecipeResult data={recipe} servings={servings} setServings={setServings} />}

        <div style={styles.poweredBy}>Powered by Claude AI · A Glova Studio concept</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
