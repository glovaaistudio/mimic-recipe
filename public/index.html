  },

  heroSub: {
    fontFamily: SANS, fontSize: "14.5px", color: INK_MUTED, lineHeight: "1.55",
    marginTop: "12px", maxWidth: "440px"
  },
  card: {
    background: CARD, borderRadius: "14px", padding: "22px", border: "1px solid " + LINE,
    boxShadow: "0 4px 24px rgba(31,77,58,0.06)", maxWidth: "600px", margin: "0 auto 24px"
  },
  tabRow: { display: "flex", gap: "8px", marginBottom: "20px" },
  tab: (active) => ({
    flex: 1, padding: "11px", border: "1.5px solid " + (active ? GREEN : LINE),

  },
  textarea: {

    resize: "vertical", outline: "none", boxSizing: "border-box", lineHeight: "1.6"
  },
  uploadArea: (dragging) => ({

    padding: "36px 20px", textAlign: "center", cursor: "pointer",
    background: dragging ? "#FBEFE6" : CREAM
  }),
  uploadIcon: { fontSize: "34px", marginBottom: "10px" },

    letterSpacing: "0.5px", marginBottom: "8px", display: "block"
  },
  btnSecondary: {
    width: "100%", padding: "11px", background: "transparent", color: INK_MUTED,
    border: "1.5px solid " + LINE, borderRadius: "9px", fontSize: "14px", fontWeight: "600",
    cursor: "pointer", fontFamily: SANS, marginTop: "0"
  },
  generateBtn: (disabled) => ({

    border: "none", borderRadius: "10px", fontSize: "15.5px", fontWeight: "700",
    cursor: disabled ? "not-allowed" : "pointer", marginTop: "18px", fontFamily: SANS,
    letterSpacing: "0.2px"
  }),
  errorBox: {
    background: "#FBEAE3", border: "1px solid #EFC4AE", borderRadius: "9px",
    padding: "13px", color: "#A4391A", fontSize: "13.5px", marginTop: "14px", fontFamily: SANS
  },
  limitBox: {
    background: "#FBF1E0", border: "1px solid " + GOLD, borderRadius: "9px",
    padding: "16px", color: "#6E4F12", fontSize: "14px", marginTop: "14px", fontFamily: SANS,
    lineHeight: "1.6"
  },
  limitBtn: {
    background: ORANGE, color: "#fff", border: "none", borderRadius: "8px",
    padding: "10px 16px", fontSize: "13.5px", fontWeight: "700", cursor: "pointer",
    fontFamily: SANS, marginTop: "10px"
  },
  usageNote: { fontSize: "13px", color: INK_MUTED, fontFamily: SANS, textAlign: "center", marginBottom: "16px" },
  signInPrompt: {
    background: CARD, borderRadius: "14px", padding: "32px 24px", textAlign: "center",
    border: "1px solid " + LINE, maxWidth: "600px", margin: "0 auto 24px"
  },
  signInTitle: { fontFamily: SERIF, fontSize: "20px", fontWeight: "700", color: INK, marginBottom: "8px" },
  signInText: { fontSize: "14px", color: INK_MUTED, marginBottom: "18px", fontFamily: SANS, lineHeight: "1.6" },
  signInBtn: {
    background: GREEN, color: "#fff", border: "none", borderRadius: "9px",

  },
  spinnerWrap: {
    display: "flex", flexDirection: "column", alignItems: "center", padding: "44px 20px",
    gap: "14px", color: INK_MUTED, fontFamily: SANS, fontSize: "14px"
  },
  resultCard: {
    background: CARD, borderRadius: "16px", overflow: "hidden", border: "1px solid " + LINE,
    boxShadow: "0 4px 24px rgba(31,77,58,0.07)", maxWidth: "600px", margin: "0 auto 24px"
  },
  resultImgWrap: { width: "100%", aspectRatio: "4/3", background: "#EFE7D4", position: "relative", overflow: "hidden" },
  resultImg: { width: "100%", height: "100%", objectFit: "cover", display: "block" },
  resultBody: { padding: "24px" },
  recipeTitle: { fontFamily: SERIF, fontSize: "23px", fontWeight: "700", color: INK, marginBottom: "5px", lineHeight: "1.2" },
  recipeTagline: { fontFamily: SANS, fontSize: "13.5px", color: INK_MUTED, marginBottom: "16px", lineHeight: "1.5" },
  badge: {
    display: "inline-block", background: "#EFF3ED", color: GREEN, borderRadius: "999px",
    padding: "4px 11px", fontSize: "11.5px", fontWeight: "600", marginRight: "6px", marginBottom: "6px",
    fontFamily: SANS
  },
  sectionHead: {
    fontFamily: MONO, fontSize: "11px", fontWeight: "700", textTransform: "uppercase",
    letterSpacing: "1px", color: GREEN, marginBottom: "10px", marginTop: "22px",
    paddingBottom: "8px", borderBottom: "1px solid " + LINE
  },
  servingsRow: { display: "flex", alignItems: "center", gap: "12px", marginBottom: "6px" },
  servingsBtn: {
    width: "32px", height: "32px", borderRadius: "50%", border: "1.5px solid " + GREEN,
    background: "white", color: GREEN, fontSize: "17px", fontWeight: "700", cursor: "pointer",
    display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1, fontFamily: SANS
  },
  servingsNum: { fontFamily: SERIF, fontSize: "17px", fontWeight: "700", color: INK, minWidth: "24px", textAlign: "center" },
  ingredientRow: {
    display: "flex", justifyContent: "space-between", alignItems: "baseline",
    padding: "9px 0", borderBottom: "1px dashed " + LINE, fontSize: "14px", fontFamily: SANS
  },
  ingredientAmount: { color: ORANGE_DARK, fontWeight: "700", fontFamily: MONO, fontSize: "13px", whiteSpace: "nowrap", marginLeft: "12px" },
  stepRow: { display: "flex", gap: "13px", marginBottom: "15px", alignItems: "flex-start" },
  stepNum: {
    minWidth: "26px", height: "26px", borderRadius: "50%", background: GREEN, color: "white",
    fontWeight: "700", fontSize: "12px", display: "flex", alignItems: "center", justifyContent: "center",
    marginTop: "1px", fontFamily: SANS, flexShrink: 0
  },
  stepText: { fontSize: "14.5px", lineHeight: "1.65", color: INK, fontFamily: SANS },
  tipBox: {
    background: "#FBF1E0", border: "1px solid " + GOLD + "55", borderRadius: "10px",
    padding: "13px 15px", fontSize: "13.5px", color: "#6E4F12", lineHeight: "1.6",
    marginTop: "18px", fontFamily: SANS
  },
  variationsText: { fontSize: "14px", color: INK, lineHeight: "1.65", fontFamily: SANS },
  premiumCard: {
    background: GREEN_DARK, borderRadius: "16px", padding: "22px", maxWidth: "600px",
    margin: "0 auto 28px", border: "1px solid " + GREEN
  },
  premiumEyebrow: {
    fontFamily: MONO, fontSize: "11px", fontWeight: "700", color: GOLD,
    textTransform: "uppercase", letterSpacing: "1px", marginBottom: "10px", display: "block"
  },
  premiumTitle: { fontFamily: SERIF, fontSize: "18px", fontWeight: "700", color: "#fff", marginBottom: "8px" },
  premiumText: { fontFamily: SANS, fontSize: "13.5px", color: "#D8E3DC", lineHeight: "1.6", marginBottom: "16px" },
  premiumBtn: {
    background: ORANGE, color: "#fff", border: "none", borderRadius: "9px",
    padding: "12px 18px", fontSize: "14px", fontWeight: "700", cursor: "pointer",
    fontFamily: SANS, display: "inline-flex", alignItems: "center", gap: "8px"
  },
  footer: { textAlign: "center", padding: "18px 20px 36px", fontSize: "12px", color: "#A89D88", fontFamily: SANS }
};

function Spinner({ text }) {
  return e("div", { style: styles.spinnerWrap },
    e("div", { style: { width: "38px", height: "38px", border: "3px solid " + LINE, borderTop: "3px solid " + ORANGE, borderRadius: "50%", animation: "spin 0.8s linear infinite" } }),
    e("span", null, text || "Decoding your recipe\u2026")
  );
}

function RecipeResult({ data, servings, setServings }) {
  const scale = servings / (data.baseServings || 2);
  const scaleAmount = (amount) => {
    const num = parseFloat(amount);
    if (isNaN(num)) return amount;
    const scaled = num * scale;
    return scaled % 1 === 0 ? scaled : scaled.toFixed(1);
  };

  return e("div", { style: styles.resultCard },
    e("div", { style: styles.resultImgWrap },
      data.imageUrl
        ? e("img", { src: data.imageUrl, alt: data.title, style: styles.resultImg })
        : e("div", { style: { width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "8px" } },
            e("div", { style: { width: "26px", height: "26px", border: "3px solid #DDD2BC", borderTop: "3px solid #E8602C", borderRadius: "50%", animation: "spin 0.8s linear infinite" } }),
            e("div", { style: { fontSize: "12px", color: "#A89D88", fontFamily: "'Inter', sans-serif" } }, "Plating your dish\u2026")
          )
    ),
    e("div", { style: styles.resultBody },
      e("div", { style: styles.recipeTitle }, data.title),
      e("div", { style: styles.recipeTagline }, data.tagline),
      e("div", { style: { marginBottom: "4px" } },
        (data.tags || []).map((t, i) => e("span", { key: i, style: styles.badge }, t))
      ),
      e("div", { style: styles.sectionHead }, "Servings"),
      e("div", { style: styles.servingsRow },
        e("button", { style: styles.servingsBtn, onClick: () => setServings(Math.max(1, servings - 1)) }, "\u2212"),
        e("span", { style: styles.servingsNum }, servings),
        e("button", { style: styles.servingsBtn, onClick: () => setServings(servings + 1) }, "+"),
        e("span", { style: { fontSize: "13.5px", color: INK_MUTED, fontFamily: SANS } }, "people")
      ),
      e("div", { style: styles.sectionHead }, "Ingredients"),
      (data.ingredients || []).map((ing, i) =>
        e("div", { key: i, style: styles.ingredientRow },
          e("span", null, ing.name),
          e("span", { style: styles.ingredientAmount }, scaleAmount(ing.amount) + " " + ing.unit)
        )
      ),
      e("div", { style: styles.sectionHead }, "Method"),
      (data.steps || []).map((step, i) =>
        e("div", { key: i, style: styles.stepRow },
          e("div", { style: styles.stepNum }, i + 1),
          e("div", { style: styles.stepText }, step)
        )
      ),
      data.tip ? e("div", { style: styles.tipBox }, "\uD83D\uDCA1 ", e("strong", null, "Pro tip: "), data.tip) : null,
      data.variations ? e(React.Fragment, null,
        e("div", { style: styles.sectionHead }, "Variations to try"),
        e("div", { style: styles.variationsText }, data.variations)
      ) : null
    )
  );
}

function PremiumTeaser({ onUpgrade }) {
  return e("div", { style: styles.premiumCard },
    e("span", { style: styles.premiumEyebrow }, "My Pantry \u00B7 Premium"),
    e("div", { style: styles.premiumTitle }, "Know what's missing before you shop"),
    e("p", { style: styles.premiumText }, "Tell us what's already in your kitchen and Mimic Recipe checks it against every recipe automatically \u2014 flagging what to buy and suggesting smart substitutes for anything you don't have."),
    e("button", { style: styles.premiumBtn, onClick: () => onUpgrade("monthly") }, "\uD83D\uDD12 Unlock Premium")
  );
}

function Header({ isSignedIn, userName, onSignIn, onSignOut }) {
  return e("div", { style: styles.header },
    e("div"),
    e("img", { src: "/assets/logo.png", alt: "Mimic Recipe", style: styles.logoImg }),
    isSignedIn
      ? e("button", { style: styles.headerBtnGhost, onClick: onSignOut }, "Sign out" + (userName ? " (" + userName + ")" : ""))
      : e("button", { style: styles.headerBtn, onClick: onSignIn }, "Sign in")
  );
}

function Hero() {
  return e(React.Fragment, null,
    e("div", { style: styles.heroImgBand },
      e("img", { src: "/assets/hero.png", alt: "", style: styles.heroImg })
    ),
    e("div", { style: styles.heroWrap },
      e("h1", { style: styles.heroTitle }, "Mimic Recipe:", e("br"), "Decode Your ", e("span", { style: styles.heroTitleAccent }, "Favourites.")),
      e("p", { style: styles.heroSub }, "Type the ingredients from any food or drink you love, or photograph the label \u2014 and get a home recipe, reverse-engineered, in seconds.")
    )
  );
}

function App() {
  const [tab, setTab] = useState("text");
  const [ingredientText, setIngredientText] = useState("");
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [loading, setLoading] = useState(false);
  const [recipe, setRecipe] = useState(null);
  const [error, setError] = useState(null);
  const [limitReached, setLimitReached] = useState(false);
  const [servings, setServings] = useState(2);
  const fileRef = useRef();

  const [clerkReady, setClerkReady] = useState(false);
  const [isSignedIn, setIsSignedIn] = useState(false);
  const [isPremium, setIsPremium] = useState(false);
  const [userName, setUserName] = useState(null);

  const refreshPremiumStatus = async () => {
    try {
      if (!window.Clerk || !window.Clerk.session) {
        setIsPremium(false);
        return;
      }
      const token = await window.Clerk.session.getToken();
      const response = await fetch("/api/check-premium", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        }
      });
      const data = await response.json();
      setIsPremium(!!data.isPremium);
    } catch (err) {
      setIsPremium(false);
    }
  };

  useEffect(() => {
    function init() {
      if (!window.Clerk) {
        setTimeout(init, 100);
        return;
      }
      window.Clerk.load().then(() => {
        setClerkReady(true);
        setIsSignedIn(!!window.Clerk.user);
        setUserName(window.Clerk.user?.firstName || null);
        if (window.Clerk.user) refreshPremiumStatus();
        window.Clerk.addListener(({ user }) => {
          setIsSignedIn(!!user);
          setUserName(user?.firstName || null);
          if (user) {
            refreshPremiumStatus();
          } else {
            setIsPremium(false);
          }
        });
      });
    }
    init();
  }, []);

  const [upgrading, setUpgrading] = useState(false);
  const [justUpgraded, setJustUpgraded] = useState(false);

  useEffect(() => {
    if (window.location.search.includes("upgraded=true")) {
      setJustUpgraded(true);
      const tryRefresh = (attempt) => {
        setTimeout(async () => {
          await refreshPremiumStatus();
          if (attempt < 5) tryRefresh(attempt + 1);
        }, 1500);
      };
      tryRefresh(0);
      window.history.replaceState({}, "", window.location.pathname);
    }
  }, []);

  const handleSignIn = () => {
    if (window.Clerk) window.Clerk.openSignIn({});
  };

  const handleSignOut = () => {
    if (window.Clerk) window.Clerk.signOut();
  };

  const handleUpgrade = async (plan) => {
    if (!window.Clerk || !window.Clerk.session) {
      handleSignIn();
      return;
    }
    setUpgrading(true);
    try {
      const token = await window.Clerk.session.getToken();
      const response = await fetch("/api/create-checkout", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ plan })
      });
      const data = await response.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert(data.error || "Something went wrong starting checkout. Please try again.");
      }
    } catch (err) {
      alert("Something went wrong starting checkout. Please try again.");
    }
    setUpgrading(false);
  };

  const handleImage = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setImageFile(file);
    const reader = new FileReader();
    reader.onload = (ev) => {
      setImagePreview(ev.target.result);
      setImageBase64(ev.target.result.split(",")[1]);
    };
    reader.readAsDataURL(file);
  };

  const generate = async () => {
    setLoading(true);
    setError(null);
    setLimitReached(false);
    setRecipe(null);
    setServings(2);
    try {
      if (!window.Clerk || !window.Clerk.session) {
        setError("Your sign-in session isn't ready yet. Please wait a moment and try again, or sign out and back in.");
        setLoading(false);
        return;
      }

      const token = await window.Clerk.session.getToken();

      if (!token) {
        setError("Couldn't verify your sign-in. Please sign out and back in, then try again.");
        setLoading(false);
        return;
      }

      const body = tab === "text"
        ? { ingredientText }
        : { imageBase64, imageMediaType: imageFile.type };

      const response = await fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        if (errData.limitReached) {
          setLimitReached(true);
          setError(errData.error);
        } else {
          throw new Error(errData.debugRaw ? "DEBUG: " + errData.debugRaw : (errData.error || "Request failed"));
        }
        setLoading(false);
        return;
      }

      const data = await response.json();
      setRecipe(data);
      setLoading(false);

      try {
        const imgResponse = await fetch("/api/generate-image", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imagePrompt: data.imagePrompt, title: data.title })
        });
        if (imgResponse.ok) {
          const imgData = await imgResponse.json();
          if (imgData.imageUrl) {
            setRecipe(prev => prev ? { ...prev, imageUrl: imgData.imageUrl } : prev);
          }
        }
      } catch (imgErr) {
        // Silent - the recipe still works perfectly without a photo.
      }
      return;
    } catch (err) {
      setError(err.message || "Something went wrong decoding that recipe. Check your ingredients and try again.");
    }
    setLoading(false);
  };

  const canGenerate = (tab === "text" ? ingredientText.trim().length > 10 : !!imageBase64) && isSignedIn;

  return e("div", { style: styles.page },
    e(Header, { isSignedIn, userName, onSignIn: handleSignIn, onSignOut: handleSignOut }),
    e(Hero),
    e("div", { style: { padding: "0 16px" } },

      !isSignedIn && clerkReady ? e("div", { style: styles.signInPrompt },
        e("div", { style: styles.signInTitle }, "Sign in to get started"),
        e("p", { style: styles.signInText }, "Create a free account to get 3 recipe decodes every month, no card required \u2014 or go Premium for unlimited decodes plus My Pantry."),
        e("button", { style: styles.signInBtn, onClick: handleSignIn }, "Sign in or create account")
      ) : null,

      isSignedIn ? e("div", { style: styles.card },
        justUpgraded ? e("div", { style: { background: "#EFF7EE", border: "1px solid #B8DBC0", borderRadius: "9px", padding: "12px 14px", marginBottom: "16px", fontSize: "13.5px", color: "#1F4D3A", fontFamily: SANS, textAlign: "center" } }, "\uD83C\uDF89 Payment received \u2014 activating your Premium access now\u2026") : null,
        isPremium
          ? e("div", { style: { ...styles.usageNote, color: GOLD, fontWeight: "700" } }, "\u2B50 You're on Premium \u2014 unlimited decodes unlocked")
          : e("div", { style: styles.usageNote }, "Free plan: 3 decodes a month \u00B7 ", e("a", { href: "#", onClick: (ev) => { ev.preventDefault(); handleUpgrade("monthly"); }, style: { color: ORANGE_DARK, fontWeight: "700", textDecoration: "none" } }, "Go Premium for unlimited")),
        e("div", { style: styles.tabRow },
          e("button", { style: styles.tab(tab === "text"), onClick: () => { setTab("text"); setRecipe(null); setError(null); setLimitReached(false); } }, "\u270F\uFE0F Type ingredients"),
          e("button", { style: styles.tab(tab === "photo"), onClick: () => { setTab("photo"); setRecipe(null); setError(null); setLimitReached(false); } }, "\uD83D\uDCF7 Upload a photo")
        ),

        tab === "text" ? e(React.Fragment, null,
          e("span", { style: styles.eyebrow }, "Ingredients list"),
          e("textarea", {
            style: styles.textarea,
            placeholder: "e.g. Water, Mango (32%), Pineapple juice, Banana pur\u00e9e, Passion fruit (4%), Lemon juice, Natural flavourings\u2026",
            value: ingredientText,
            onChange: ev => setIngredientText(ev.target.value)
          })
        ) : null,

        tab === "photo" ? e(React.Fragment, null,
          e("span", { style: styles.eyebrow }, "Product label photo"),
          imagePreview ? e(React.Fragment, null,
            e("img", { src: imagePreview, alt: "Label preview", style: styles.previewImg }),
            e("button", {
              style: styles.btnSecondary,
              onClick: () => { setImageFile(null); setImagePreview(null); setImageBase64(null); }
            }, "Remove photo")
          ) : e("div", {
            style: styles.uploadArea(dragging),
            onClick: () => fileRef.current.click(),
            onDragOver: ev => { ev.preventDefault(); setDragging(true); },
            onDragLeave: () => setDragging(false),
            onDrop: ev => { ev.preventDefault(); setDragging(false); handleImage(ev.dataTransfer.files[0]); }
          },
            e("div", { style: styles.uploadIcon }, "\uD83D\uDCF8"),
            e("div", { style: styles.uploadText }, "Tap to upload or drag a photo here"),
            e("div", { style: { fontSize: "13px", color: "#AABCAA" } }, "JPG, PNG, WEBP supported"),
            e("input", { ref: fileRef, type: "file", accept: "image/*", style: { display: "none" }, onChange: ev => handleImage(ev.target.files[0]) })
          )
        ) : null,

        e("button", { style: styles.generateBtn(!canGenerate), disabled: !canGenerate, onClick: generate }, "Generate My Recipe \u2192"),

        limitReached ? e("div", { style: styles.limitBox },
          "\uD83D\uDD12 " + error,
          e("br"),
          e("button", { style: styles.limitBtn, onClick: () => handleUpgrade("monthly") }, "Upgrade to Premium")
        ) : (error ? e("div", { style: styles.errorBox }, "\u26A0\uFE0F " + error) : null)

      ) : null,

      loading ? e("div", { style: { maxWidth: "600px", margin: "0 auto 24px", background: CARD, borderRadius: "16px", border: "1px solid " + LINE } }, e(Spinner)) : null,
      (recipe && !loading) ? e(React.Fragment, null,
        e(RecipeResult, { data: recipe, servings: servings, setServings: setServings }),
        !isPremium ? e(PremiumTeaser, { onUpgrade: handleUpgrade }) : null
      ) : null,
      e("div", { style: styles.footer }, "Powered by Claude AI \u00B7 A Glova Studio concept")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
